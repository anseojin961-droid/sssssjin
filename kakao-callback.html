<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /></head>
<body>
<script>
  const params = new URLSearchParams(location.search);
  const code = params.get("code");
  const error = params.get("error");
  if (error) {
    alert("카카오 로그인 취소됨");
    location.href = "/";
  } else if (code) {
    sessionStorage.setItem("kakaoCode", code);
    location.replace("/");
  } else {
    location.href = "/";
  }
</script>
</body>
</html>
